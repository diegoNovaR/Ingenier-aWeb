<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Contacto</title>
</head>
<body>

    <nav class="nav">
    <img src="imagenes/logo.svg" alt="logo" class="logo">

        <ul class="nav-buttons">
            <li><a href="me.html">Nosotros</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="/Practica1/standards/estandar_Csharp.html">Estándar Web</a></li>
        </ul>
    </nav>

    <section class="seccion_formulario">
    <div class="container">
        <div class="formulario">
            <h1>Contáctanos</h1>
            
            <form class="form" action="submit">
                <div class="form-group">
                <label for="nombre">Nombres</label>
                <input type="text" id="nombre" placeholder="Diego Paolo">
                </div>

                <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" placeholder="Nova Rosas">
                </div>

                <div class="form-group">
                <label for="correo">Correo</label>
                <input type="text" id="correo" placeholder="dnovar@ulasalle.edu.pe">
                </div>

                <div class="form-group">
                <label for="edad">Edad</label>
                <input type="number" id="edad" placeholder="25">
                </div>
                
                <div class="form-group">
                <label for="comentario">Comentario</label>
                <input type="text" id="comentario" placeholder="Deja tu comentario"></input>

                </div>

                <button class="button_submit">Enviar</button>
            </form>
        
        </div>

        <div class="container-icon">
            <i class="bi bi-instagram"></i>
            <p>Instagran</p>

            <i class="bi bi-facebook"></i>
            <p>Facebook</p>

            <i class="bi bi-whatsapp"></i>
            <p>whatsapp</p>

            <i class="bi bi-linkedin"></i>
            <p>Linkedin</p>
        </div>

    </div>
    
    </section>
    
</body>
</html>
