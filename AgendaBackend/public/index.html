<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Web</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1> Agenda Personal </h1>
        
        <div id="form-evento">
            <h3>Crear Nuevo Evento</h3>
            <div class="form-group">
                <label>Fecha:</label> <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Hora:</label> <input type="time" id="hora">
            </div>
            <div class="form-group">
                <label>Título:</label> <input type="text" id="titulo">
            </div>
            <div class="form-group">
                <label>Descripción:</label> <textarea id="descripcion"></textarea>
            </div>
            <button onclick="guardarEvento()"> Guardar Evento </button>
        </div>

        <hr>

        <h3>Ver Eventos</h3>
        <div id="arbol-eventos" class="tree-view"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
